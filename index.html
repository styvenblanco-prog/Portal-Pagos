<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Seguro | BLANKO TECH</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #0f111a; color: #ffffff; }
        .caja-pago { background-color: #1e2233; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; margin: auto; border: 1px solid #2a2f45; }
        h2 { color: #00d2ff; margin-bottom: 5px; }
        p { color: #8e95ab; margin-bottom: 30px; font-size: 15px; }
    </style>
    <script type="module" src="https://esm.sh/@apolopay-sdk/ui"></script>
</head>
<body>

    <div class="caja-pago">
        <h2>💳 BLANKO TECH (V2)</h2> 
        <p>Estás a un paso de finalizar tu compra.</p>
        
        <div id="contenedor-boton">
            <p style="color: #ffcc00;">⏳ Cargando botón...</p>
        </div>
    </div>

    <script>
        // 🔑 PON TU LLAVE PÚBLICA AQUÍ ABAJO (pk_...)
        const PUBLIC_KEY = "pk_21d8c63c22ee40c6d15fa9b305f9ee22"; 

        // Extraemos el ID mágico
        const urlParams = new URLSearchParams(window.location.search);
        const processId = urlParams.get('id');
        const contenedor = document.getElementById('contenedor-boton');

        if (processId && processId !== "null") {
            // Inyectamos el botón directamente
            contenedor.innerHTML = '<payment-button public-key="' + PUBLIC_KEY + '" process-id="' + processId + '"></payment-button>';
        } else {
            contenedor.innerHTML = "<p style='color:#ff4a4a;'>❌ Error: Falta el ID de la orden en el enlace.</p>";
        }
    </script>

</body>
</html>
